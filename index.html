<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌸 LSTI · 晟斗士人格类型测试</title>
    <!-- html2canvas 保存图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
        }
        body {
            background-image: url('https://s41.ax1x.com/2026/04/21/peg5TqU.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #fad4e4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid white;
            object-fit: contain;
        }

        /* 封面 */
        .cover-container {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 35px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 480px;
            text-align: center;
            border: 1px solid rgba(255, 220, 230, 0.5);
            box-shadow: 0 10px 25px -8px rgba(180, 80, 120, 0.15);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }
        .cover-lsti {
            font-size: 1.3rem;
            font-weight: 600;
            color: #b95c7c;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        .cover-title {
            font-family: 'YouYuan', '幼圆', 'Segoe UI', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d45c86 0%, #b34e6e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 10px rgba(210, 80, 120, 0.25);
            margin-bottom: 15px;
            letter-spacing: 2px;
            line-height: 1.2;
            white-space: nowrap;
        }
        .cover-subtitle {
            font-size: 1.1rem;
            color: #b34e6e;
            margin-bottom: 35px;
            font-weight: 500;
            letter-spacing: 2px;
            opacity: 0.9;
            border-top: 1.5px solid rgba(210, 80, 120, 0.5);
            border-bottom: 1.5px solid rgba(210, 80, 120, 0.5);
            padding: 10px 25px;
            display: inline-block;
        }
        .cover-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border: 2px solid #e8749a;
            color: #a13b63;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 14px 44px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #bc4e76, 0 8px 20px rgba(210, 80, 120, 0.2);
            transition: 0.2s;
            margin-top: 20px;
        }
        .cover-btn:hover {
            background: rgba(255, 220, 230, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #bc4e76, 0 12px 25px rgba(210, 80, 120, 0.25);
        }
        .cover-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b95c7c;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        /* 主测试卡片 */
        .test-container {
            max-width: 760px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 36px;
            box-shadow: 0 20px 40px -8px rgba(180, 80, 120, 0.15);
            padding: 28px 24px;
            border: 1px solid rgba(255, 220, 230, 0.3);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(251, 182, 206, 0.5);
        }
        h1 {
            font-weight: 650;
            font-size: 1.8rem;
            color: #832a4c;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        h1 small {
            font-size: 1rem;
            font-weight: 500;
            color: #b95c7c;
        }
        .music-toggle {
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: #a13b63;
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(180,80,120,0.1);
            transition: 0.15s;
            border: 1px solid rgba(251, 193, 212, 0.5);
        }
        .music-toggle:hover {
            background: rgba(251, 196, 214, 0.4);
            transform: scale(1.05);
        }
        .music-toggle.off {
            opacity: 0.7;
            color: #888;
        }
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0 20px;
        }
        .progress-label {
            font-weight: 600;
            color: #832a4c;
            background: rgba(255, 224, 235, 0.4);
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .progress-track {
            flex: 1;
            height: 8px;
            background: rgba(251, 196, 214, 0.4);
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 4%;
            background: #d45c86;
            border-radius: 20px;
            transition: width 0.25s;
        }
        .question-card {
            background: rgba(255, 240, 245, 0.25);
            border-radius: 32px;
            padding: 28px 24px;
            margin: 16px 0 24px;
            box-shadow: 0 8px 18px -6px rgba(180, 60, 100, 0.08);
            border: 1px solid rgba(251, 193, 212, 0.4);
        }
        .q-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .q-num-badge {
            background: #e8749a;
            color: white;
            font-weight: 700;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-size: 1.2rem;
            box-shadow: 0 4px 6px rgba(200, 70, 110, 0.25);
        }
        .q-text {
            font-size: 1.45rem;
            font-weight: 700;
            line-height: 1.35;
            color: #63203a;
            flex: 1;
            text-shadow: 0 1px 3px rgba(255,255,255,0.3);
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 24px;
            padding: 16px 20px;
            border: 1.5px solid rgba(251, 182, 206, 0.6);
            box-shadow: 0 3px 0 rgba(233, 165, 188, 0.4);
            cursor: pointer;
            transition: all 0.15s;
        }
        .option-item.selected {
            background: rgba(253, 227, 236, 0.65);
            border-color: #d45c86;
            box-shadow: 0 3px 0 #bc4e76;
        }
        .option-item input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #e28fb0;
            border-radius: 50%;
            margin-right: 18px;
            margin-top: 2px;
            flex-shrink: 0;
            transition: 0.1s;
        }
        .option-item input[type="radio"]:checked {
            border-color: #bc4e76;
            background: #bc4e76;
            box-shadow: inset 0 0 0 5px white, 0 0 0 1px #bc4e76;
        }
        .opt-letter {
            font-weight: 800;
            font-size: 1.5rem;
            color: #a13b63;
            width: 32px;
            text-align: center;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .opt-desc {
            font-size: 1.05rem;
            color: #3a1a28;
            flex: 1;
            line-height: 1.4;
            font-weight: 500;
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .nav-btn {
            background: rgba(255, 224, 235, 0.5);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #832a4c;
            box-shadow: 0 4px 0 #e9a5bc;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid rgba(251, 193, 212, 0.6);
            min-width: 120px;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            box-shadow: 0 2px 0 #e9a5bc;
            transform: translateY(2px);
            pointer-events: none;
        }
        .nav-btn:hover:not(:disabled) {
            background: rgba(251, 196, 214, 0.7);
            transform: translateY(-1px);
            box-shadow: 0 5px 0 #d989a8;
        }
        .submit-btn {
            background: #d45c86;
            color: white;
            box-shadow: 0 5px 0 #a63a62;
            border: none;
            padding: 14px 32px;
            font-size: 1.2rem;
        }
        .submit-btn:hover {
            background: #e0709a;
        }
        .footer-progress {
            display: flex;
            justify-content: center;
            margin: 20px 0 8px;
        }
        .progress-badge {
            background: rgba(255, 255, 255, 0.4);
            padding: 10px 32px;
            border-radius: 50px;
            font-weight: 600;
            color: #832a4c;
            font-size: 1.2rem;
            box-shadow: 0 2px 10px rgba(200,80,120,0.1);
            border: 1px solid rgba(251, 193, 212, 0.5);
        }
        .page-footer-lsti {
            text-align: center;
            font-size: 0.75rem;
            color: #b95c7c;
            letter-spacing: 2px;
            margin-top: 8px;
            opacity: 0.7;
        }

        /* 结果面板 */
        .result-panel {
            margin-top: 10px;
            background: rgba(255, 240, 245, 0.35);
            border-radius: 32px;
            padding: 28px 24px;
            border-left: 8px solid #d45c86;
            box-shadow: 0 8px 20px -6px rgba(180, 60, 100, 0.1);
        }
        .result-lsti {
            font-size: 1.2rem;
            font-weight: 600;
            color: #a13b63;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 5px;
        }
        .result-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: #63203a;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.3;
        }
        .chart-container {
            display: flex;
            justify-content: center;
            margin: 10px 0 15px;
        }
        canvas {
            max-width: 220px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        .bar-chart-area {
            margin: 16px 0 10px;
            padding: 0 8px;
        }
        .bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .bar-label {
            width: 70px;
            font-weight: 600;
            color: #63203a;
            font-size: 1rem;
        }
        .bar-bg {
            flex: 1;
            height: 20px;
            background: #f9d6e0;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 30px;
            transition: width 0.3s;
        }
        .bar-percent {
            width: 50px;
            text-align: right;
            font-weight: 600;
            color: #a13b63;
        }
        .type-desc-box {
            margin-top: 20px;
        }
        .type-card {
            background: rgba(255, 255, 255, 0.45);
            border-radius: 24px;
            padding: 18px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(251, 193, 212, 0.6);
        }
        .type-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #a13b63;
            margin-bottom: 6px;
        }
        .type-desc {
            color: #4a2233;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .type-images {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .type-images img {
            width: calc(33.33% - 7px);
            max-width: 120px;
            border-radius: 16px;
            object-fit: cover;
            aspect-ratio: 1/1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid white;
            background: #fce4ec;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .type-images img:hover {
            transform: scale(1.02);
        }
        .save-btn-container {
            display: flex;
            justify-content: center;
            margin: 24px 0 8px;
        }
        .save-btn {
            background: #a13b63;
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 5px 0 #6d2a45;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #c96b8a;
        }
        .save-btn:hover {
            background: #bc4e76;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #6d2a45;
        }
        .footer-note {
            font-size: 0.8rem;
            color: #b95c7c;
            text-align: center;
            margin-top: 24px;
        }
        .disclaimer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #a05a78;
            opacity: 0.8;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 500px) {
            .test-container, .cover-container { padding: 20px 16px; }
            .cover-title { font-size: 2.2rem; white-space: normal; }
            h1 { font-size: 1.5rem; }
            .q-text { font-size: 1.25rem; }
            .opt-desc { font-size: 0.95rem; }
            .option-item { padding: 14px 16px; }
            .type-images img { max-width: 100px; }
        }
    </style>
</head>
<body>

<!-- 背景音乐 -->
<audio id="bgMusic" src="https://raw.githubusercontent.com/l-zzhi/l-zzhi.github.io/refs/heads/main/%E6%9D%8E%E6%99%9F%20-%20%E9%99%AA%E6%88%91%E5%8E%BB%E7%96%AF%E8%B7%91.mp3" loop preload="auto"></audio>

<!-- 封面页 -->
<div id="coverPage" class="cover-container">
    <div class="cover-lsti">LSTI</div>
    <div class="cover-title">晟斗士人格类型测试</div>
    <div class="cover-subtitle">每一份喜欢 都有独特的形状</div>
    <button class="cover-btn" id="startBtn">开始测试</button>
    <div class="cover-footer">LSTI</div>
</div>

<!-- 主测试区 -->
<div id="mainTest" class="test-container hidden">
    <div class="title-row">
        <h1>🌸 LSTI · 晟斗士 <small id="pageIndicator">1/25</small></h1>
        <button class="music-toggle" id="musicToggle" title="音乐开关">🔇</button>
    </div>
    
    <div id="quizSection">
        <div class="progress-container">
            <span class="progress-label" id="progressText">第1题</span>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 4%;"></div>
            </div>
        </div>
        <div id="questionArea" class="question-card"></div>
        <div class="nav-row">
            <button class="nav-btn" id="prevBtn" disabled>← 上一题</button>
            <button class="nav-btn" id="nextBtn">下一题 →</button>
        </div>
        <div style="display: flex; justify-content: center; margin: 16px 0;">
            <button class="nav-btn submit-btn" id="submitBtn" style="display: none;">🔮 查看你的晟斗士人格类型</button>
        </div>
        <div class="footer-progress">
            <span class="progress-badge" id="bottomProgress">第 1 / 25 题</span>
        </div>
        <div class="page-footer-lsti">LSTI</div>
    </div>

    <div id="resultSection" class="result-panel" style="display: none;">
        <div class="result-lsti">LSTI</div>
        <div class="result-title" id="resultMainTitle">你的晟斗士人格类型</div>
        <div class="chart-container">
            <canvas id="resultChart" width="220" height="220"></canvas>
        </div>
        <div class="bar-chart-area" id="barChartArea"></div>
        <div class="type-desc-box" id="typeDescriptions"></div>
        <div class="save-btn-container">
            <button class="save-btn" id="saveImageBtn">📸 保存图片</button>
        </div>
        <div class="disclaimer">测试内容仅供娱乐</div>
    </div>
    <div class="footer-note">LSTI · 每一份爱都有独特的形状</div>
</div>

<script>
    (function() {
        // ---------- 题库 ----------
        const questions = [
            { text: "刚结束疲惫的一天，你最想通过哪种方式“回血”？", options: [
                { letter: "A", desc: "翻出李晟以前的舞台，舔颜并为李晟超好听的歌声超有魅力的舞台发疯。", tags: ["舞台粉","颜粉","歌手粉","颜粉"] },
                { letter: "B", desc: "打开超话，看看今天超话更新的内容，签到点赞评论转发做做数据。", tags: ["数据粉","产出粉"] },
                { letter: "C", desc: "打开各个软件看李晟今天有没有更新。", tags: ["物料粉","产出粉","颜粉"] },
                { letter: "D", desc: "打开音乐软件，循环播放李晟的歌。", tags: ["歌手粉","舞台粉"] }
            ]},
            { text: "如果要向一个人不了解李晟的人安利她，你会首先选择哪一项？", options: [
                { letter: "A", desc: "介绍某部剧里很有魅力的角色，精细的演技。", tags: ["安利粉","演员粉","颜粉"] },
                { letter: "B", desc: "翻出某个采访里你觉得很有道理很哲学的话，让你从中学到/跟你一模一样的部分。", tags: ["访谈粉"] },
                { letter: "C", desc: "令人着迷的颜值，女神好伟大的一张脸。", tags: ["颜粉","女友粉","颜粉"] },
                { letter: "D", desc: "光彩四射的舞台，谁看谁爱上的满分爱豆。", tags: ["歌手粉","舞台粉"] }
            ]},
            { text: "晚上躺在床上刷手机，你最可能在干什么？", options: [
                { letter: "A", desc: "凌晨零点抢超话首签，连签也不能断。", tags: ["数据粉"] },
                { letter: "B", desc: "在各个软件寻找她的踪迹，到处搜索刷视频。", tags: ["颜粉","物料粉","颜粉"] },
                { letter: "C", desc: "打开那部看了无数遍的剧继续第n遍观看。", tags: ["演员粉"] },
                { letter: "D", desc: "听歌，好美妙动听悦耳的声音。", tags: ["歌手粉","舞台粉"] }
            ]},
            { text: "她的新剧终于播出了，你的状态是：", options: [
                { letter: "A", desc: "疯狂截图她的绝美造型，发朋友圈发微博发给朋友猛夸。", tags: ["颜粉","安利粉","颜粉"] },
                { letter: "B", desc: "专心投入剧情，等结束后马上发长篇剧评夸演技。", tags: ["演员粉"] },
                { letter: "C", desc: "追剧进度完全靠刷社交平台，不打开播放器，专门在超话里存别人整理的高清cut和动图。", tags: ["物料粉","颜粉"] },
                { letter: "D", desc: "对搭戏角色过敏，只要别的角色跟她有互动，就在屏幕前疯狂吃醋或代入。", tags: ["妈粉","女友粉"] }
            ]},
            { text: "如果她毫无预兆地突然发动态（微博抖音小红书等），你的第一反应是：", options: [
                { letter: "A", desc: "疯狂点赞评论转发，立刻去评论区抢前排热评。", tags: ["安利粉","数据粉"] },
                { letter: "B", desc: "赶紧点开大图，看看图文内容，夸赞美貌。", tags: ["颜粉","物料粉","颜粉"] },
                { letter: "C", desc: "马上截图发给同担并疯狂尖叫。", tags: ["颜粉"] },
                { letter: "D", desc: "仔细查看发表的文字或配文，开始逐字研究。", tags: ["产出粉","访谈粉"] }
            ]},
            { text: "她在工作（剧组综艺等）中遭遇了不公正的舆论抹黑，你会：", options: [

            "安利粉": { name:"📣 安利粉", desc:"你的终极使命，是让全世界都知道她的好。朋友聚会时你三句不离她的名字，朋友圈和微博首页全是她的美图和直拍链接。你精心挑选她的舞台视频，配上热情洋溢的安利文案，像一个不知疲倦的人形种草机。你相信，她的光芒值得被更多人看见，在你孜孜不倦的安利下，你用自己的方式，让她的星光洒向更远的地方。" }
        };

        const totalQ = questions.length;
        let currentIndex = 0;
        let answers = new Array(totalQ).fill(null);
        
        const coverPage = document.getElementById('coverPage');
        const mainTest = document.getElementById('mainTest');
        const startBtn = document.getElementById('startBtn');
        const quizSection = document.getElementById('quizSection');
        const resultSection = document.getElementById('resultSection');
        const questionArea = document.getElementById('questionArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const musicToggle = document.getElementById('musicToggle');
        const pageIndicator = document.getElementById('pageIndicator');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const bottomProgress = document.getElementById('bottomProgress');
        const saveImageBtn = document.getElementById('saveImageBtn');
        const bgMusic = document.getElementById('bgMusic');

        let isAutoJumping = false;
        let musicPlaying = false;

        // 自动播放音乐（打开页面即尝试）
        function tryAutoPlay() {
            bgMusic.play().then(() => {
                musicPlaying = true;
                musicToggle.textContent = '🔊';
                musicToggle.classList.remove('off');
            }).catch(() => {
                musicToggle.textContent = '🔇';
                musicToggle.classList.add('off');
                const resumeOnce = () => {
                    if (!musicPlaying) {
                        bgMusic.play().then(() => {
                            musicPlaying = true;
                            musicToggle.textContent = '🔊';
                            musicToggle.classList.remove('off');
                        }).catch(()=>{});
                    }
                    document.removeEventListener('click', resumeOnce);
                    document.removeEventListener('touchstart', resumeOnce);
                };
                document.addEventListener('click', resumeOnce);
                document.addEventListener('touchstart', resumeOnce);
            });
        }
        tryAutoPlay();

        // 音乐开关
        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (musicPlaying) {
                bgMusic.pause();
                musicToggle.textContent = '🔇';
                musicToggle.classList.add('off');
                musicPlaying = false;
            } else {
                bgMusic.play().then(() => {
                    musicToggle.textContent = '🔊';
                    musicToggle.classList.remove('off');
                    musicPlaying = true;
                }).catch(()=>{});
            }
        });

        function showLightbox(imgSrc) {
            const lightbox = document.createElement('div');
            lightbox.className = 'lightbox';
            const img = document.createElement('img');
            img.src = imgSrc;
            lightbox.appendChild(img);
            document.body.appendChild(lightbox);
            lightbox.addEventListener('click', () => document.body.removeChild(lightbox));
        }
        window.showLightbox = showLightbox;

        function startTest() {
            coverPage.classList.add('hidden');
            mainTest.classList.remove('hidden');
            renderQuestion(0);
            if (!musicPlaying) {
                bgMusic.play().then(() => {
                    musicPlaying = true;
                    musicToggle.textContent = '🔊';
                    musicToggle.classList.remove('off');
                }).catch(()=>{});
            }
        }
        startBtn.addEventListener('click', startTest);

        function renderQuestion(index) {
            const q = questions[index];
            const selected = answers[index];
            let html = `<div class="q-header"><span class="q-num-badge">${index+1}</span><div class="q-text">${q.text}</div></div><div class="options-list">`;
            q.options.forEach((opt, optIdx) => {
                const isChecked = (selected && selected.letter === opt.letter);
                html += `<label class="option-item ${isChecked ? 'selected' : ''}">
                    <input type="radio" name="question" value="${opt.letter}" data-opt-index="${optIdx}" ${isChecked ? 'checked' : ''}>
                    <span class="opt-letter">${opt.letter}</span>
                    <span class="opt-desc">${opt.desc}</span>
                </label>`;
            });
            html += `</div>`;
            questionArea.innerHTML = html;
            document.querySelectorAll('input[name="question"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const optIndex = e.target.dataset.optIndex;
                    answers[currentIndex] = questions[currentIndex].options[optIndex];
                    document.querySelectorAll('.option-item').forEach(item => {
                        const inp = item.querySelector('input');
                        if (inp && inp.checked) item.classList.add('selected');
                        else item.classList.remove('selected');
                    });
                    updateNavAndProgress();
                    if (currentIndex < totalQ - 1 && !isAutoJumping) {
                        isAutoJumping = true;
                        setTimeout(() => {
                            goToPage(currentIndex + 1);
                            isAutoJumping = false;
                        }, 200);
                    }
                });
            });
            updateNavAndProgress();
        }

        function updateNavAndProgress() {
            const cur = currentIndex + 1;
            pageIndicator.innerText = `${cur}/${totalQ}`;
            progressText.innerText = `第${cur}题`;
            progressFill.style.width = `${(cur / totalQ) * 100}%`;
            bottomProgress.innerText = `第 ${cur} / ${totalQ} 题`;
            prevBtn.disabled = (currentIndex === 0);
            const isLast = (currentIndex === totalQ - 1);
            nextBtn.style.display = isLast ? 'none' : 'inline-block';
            submitBtn.style.display = isLast ? 'inline-block' : 'none';
        }

        function goToPage(newIdx) {
            if (newIdx < 0 || newIdx >= totalQ) return;
            currentIndex = newIdx;
            renderQuestion(currentIndex);
        }

        function calculateScores() {
            const map = new Map();
            const scoringIndices = [...Array(16).keys(), 18, 19, 20];
            scoringIndices.forEach(i => {
                const ans = answers[i];
                if (ans && ans.tags) {
                    ans.tags.forEach(tag => map.set(tag, (map.get(tag) || 0) + 1));
                }
            });
            return Array.from(map.entries()).sort((a,b) => b[1]-a[1]);
        }

        function drawPieChart(topTags) {
            const canvas = document.getElementById('resultChart');
            const ctx = canvas.getContext('2d');
            const total = topTags.reduce((s, t) => s + t[1], 0);
            const colors = ['#d45c86', '#e8749a', '#f6a5c1'];
            let start = -Math.PI/2;
            ctx.clearRect(0,0,220,220);
            topTags.forEach((tag, i) => {
                const angle = (tag[1]/total) * 2 * Math.PI;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(110,110);
                ctx.arc(110,110,90, start, start+angle);
                ctx.closePath();
                ctx.fill();
                start += angle;
            });
            ctx.beginPath();
            ctx.fillStyle = '#fff0f5';
            ctx.arc(110,110,48,0,2*Math.PI);
            ctx.fill();
        }

        function renderBarChart(top3) {
            const total = top3.reduce((s, t) => s + t[1], 0);
            const colors = ['#d45c86', '#e8749a', '#f6a5c1'];
            const barArea = document.getElementById('barChartArea');
            barArea.innerHTML = top3.map((tag, i) => {
                const percent = (tag[1] / total) * 100;
                return `<div class="bar-item">
                    <span class="bar-label">${tag[0]}</span>
                    <div class="bar-bg"><div class="bar-fill" style="width:${percent}%; background:${colors[i]};"></div></div>
                    <span class="bar-percent">${percent.toFixed(1)}%</span>
                </div>`;
            }).join('');
        }

        function showResult() {
            if (answers.some((a,i) => (i<16 || i===18||i===19||i===20) && a === null)) {
                alert('请完成所有题目后再查看结果～');
                const idx = answers.findIndex((a,i) => (i<16||i===18||i===19||i===20) && a === null);
                if (idx !== -1) goToPage(idx);
                return;
            }
            const sorted = calculateScores();
            const top3 = sorted.slice(0,3);
            drawPieChart(top3);
            renderBarChart(top3);
            
            const descBox = document.getElementById('typeDescriptions');
            descBox.innerHTML = top3.map(t => {
                const info = typeDescriptions[t[0]] || { name:t[0], desc:"每一种喜欢都独一无二。" };
                const images = typeImages[t[0]] || [];
                const imgHtml = images.length ? `<div class="type-images">${images.map(url => `<img src="${url}" alt="${t[0]}" crossorigin="anonymous" onclick="showLightbox('${url}')">`).join('')}</div>` : '';
                return `<div class="type-card"><div class="type-name">${info.name}</div><div class="type-desc">${info.desc}</div>${imgHtml}</div>`;
            }).join('');
            
            quizSection.style.display = 'none';
            resultSection.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveAsImage() {
            const element = document.getElementById('resultSection');
            html2canvas(element, { scale: 2, backgroundColor: null, allowTaint: false, useCORS: true, logging: false }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'LSTI_晟斗士人格类型.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => { alert('保存失败，可稍后重试。'); });
        }

        saveImageBtn.addEventListener('click', saveAsImage);
        prevBtn.addEventListener('click', () => { if (currentIndex>0) goToPage(currentIndex-1); });
        nextBtn.addEventListener('click', () => { if (currentIndex<totalQ-1) goToPage(currentIndex+1); });
        submitBtn.addEventListener('click', showResult);
    })();
</script>
</body>
</html>
