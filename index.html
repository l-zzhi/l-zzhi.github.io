<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌱 分页·测测你是晟斗士中的哪一种</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f9f3e8 0%, #e8e0f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .test-wrapper {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 36px;
            box-shadow: 0 20px 40px -8px rgba(40, 20, 60, 0.15), 0 4px 12px rgba(0,0,0,0.05);
            padding: 28px 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        h1 {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            font-weight: 650;
            font-size: 1.9rem;
            letter-spacing: -0.01em;
            color: #2b1f3a;
            margin-bottom: 8px;
            padding-bottom: 16px;
            border-bottom: 2px solid #d9cae3;
        }
        h1 small {
            font-size: 1rem;
            font-weight: 500;
            color: #6b5b7c;
            margin-left: 8px;
        }
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0 20px;
        }
        .progress-label {
            font-weight: 600;
            color: #4a385e;
            background: #e5d9f0;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .progress-track {
            flex: 1;
            height: 8px;
            background: #ddd2e3;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 10%;
            background: #9b7fb4;
            border-radius: 20px;
            transition: width 0.25s;
        }
        /* 问题卡片 */
        .question-card {
            background: #fdfaff;
            border-radius: 32px;
            padding: 28px 24px;
            margin: 16px 0 24px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8), 0 8px 18px -6px rgba(70, 40, 90, 0.08);
            border: 1px solid #ede4f5;
        }
        .q-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .q-num-badge {
            background: #b9a4d1;
            color: white;
            font-weight: 700;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-size: 1.2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .q-text {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
            color: #221c2e;
            flex: 1;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-item {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 14px 20px;
            border: 1.5px solid #ded0e8;
            box-shadow: 0 3px 0 #cfc0dd;
            cursor: pointer;
            transition: all 0.15s;
        }
        .option-item.selected {
            background: #ede2f9;
            border-color: #9f84bb;
            box-shadow: 0 3px 0 #846da3;
        }
        .option-item input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #b7a0cb;
            border-radius: 50%;
            margin-right: 18px;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .option-item input[type="radio"]:checked {
            border-color: #7b5f9c;
            background: #7b5f9c;
            box-shadow: inset 0 0 0 5px white, 0 0 0 1px #7b5f9c;
        }
        .opt-letter {
            font-weight: 800;
            font-size: 1.6rem;
            color: #4e3868;
            width: 36px;
            text-align: center;
            margin-right: 12px;
        }
        .opt-desc {
            font-size: 1.1rem;
            color: #2b1e38;
            flex: 1;
        }
        /* 导航区 */
        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .nav-btn {
            background: #f0e9f5;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #2e223e;
            box-shadow: 0 4px 0 #cbbae0;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #ddd0e9;
            min-width: 120px;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            box-shadow: 0 2px 0 #cbbae0;
            transform: translateY(2px);
            pointer-events: none;
        }
        .nav-btn:hover:not(:disabled) {
            background: #e2d5f0;
            transform: translateY(-1px);
            box-shadow: 0 5px 0 #b9a5ce;
        }
        .nav-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b9a5ce;
        }
        .submit-btn {
            background: #9b7fb4;
            color: white;
            box-shadow: 0 5px 0 #6a4d84;
            border: none;
            padding: 14px 32px;
            font-size: 1.2rem;
        }
        .submit-btn:hover {
            background: #b095ca;
        }
        .reset-btn {
            background: transparent;
            border: none;
            color: #5e4b70;
            text-decoration: underline;
            font-size: 1rem;
            font-weight: 500;
            padding: 8px 12px;
            cursor: pointer;
        }
        .action-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 8px;
        }
        /* 结果面板 */
        .result-panel {
            margin-top: 28px;
            background: #f9f2ff;
            border-radius: 28px;
            padding: 24px 26px;
            border-left: 8px solid #a583be;
            box-shadow: 0 8px 18px -6px rgba(60,30,70,0.1);
        }
        .result-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #312740;
            margin-bottom: 10px;
        }
        .result-desc {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #2d2538;
        }
        .score-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 24px;
            margin: 16px 0 14px;
        }
        .score-badge {
            background: #dccfee;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #2c1c3e;
        }
        .result-tip {
            font-style: italic;
            color: #4e3e5e;
            border-top: 1.5px dashed #cdbadb;
            padding-top: 16px;
            margin-top: 8px;
        }
        .footer-note {
            font-size: 0.8rem;
            color: #6a5d7a;
            text-align: center;
            margin-top: 24px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 500px) {
            .test-wrapper { padding: 20px 16px; }
            h1 { font-size: 1.6rem; }
            .q-text { font-size: 1.3rem; }
            .opt-desc { font-size: 1rem; }
            .option-item { padding: 12px 16px; }
            .nav-btn { min-width: 100px; padding: 10px 18px; }
        }
    </style>
</head>
<body>
<div class="test-wrapper">
    <h1>🧭 性格罗盘 <small id="pageIndicator">1/10</small></h1>
    
    <!-- 进度条 -->
    <div class="progress-container">
        <span class="progress-label" id="progressText">第1题</span>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width: 10%;"></div>
        </div>
    </div>

    <!-- 动态题目区域 -->
    <div id="questionArea" class="question-card"></div>

    <!-- 导航按钮 -->
    <div class="nav-row">
        <button class="nav-btn" id="prevBtn" disabled>← 上一题</button>
        <button class="nav-btn" id="nextBtn">下一题 →</button>
    </div>

    <!-- 提交与重置 -->
    <div class="action-group">
        <button class="nav-btn submit-btn" id="submitBtn" style="display: none;">✨ 查看结果</button>
        <button class="reset-btn" id="resetBtn">↻ 重新开始</button>
    </div>

    <!-- 结果展示区 -->
    <div id="resultArea" class="result-panel" style="display: none;">
        <div class="result-title" id="resultTitle">——</div>
        <div class="score-row" id="scoreDisplay"></div>
        <div class="result-desc" id="resultDesc"></div>
        <div class="result-tip" id="resultTip"></div>
    </div>
    <div class="footer-note">每一页都是内心的拼图 · 答案无对错</div>
</div>

<script>
    (function() {
        // ---------- 题库 (10题) ----------
        const questions = [
            { text: "刚结束疲惫的一天，你最想通过哪种方式“回血”？", options: [
                { letter: "A", desc: "翻出李晟以前的舞台，舔颜并为李晟超好听的歌声超有魅力的舞台发疯" },
                { letter: "B", desc: "打开超话，看看今天超话更新的内容，签到点赞评论转发做做数据" },
                { letter: "C", desc: "打开各个软件看李晟今天有没有更新" }
                { letter: "D", desc: "打开音乐软件，循环播放李晟的歌" }
            ]},
            { text: "处理复杂任务时，你的第一反应是？", options: [
                { letter: "A", desc: "立刻行动，边做边调整" },
                { letter: "B", desc: "制定详细计划，追求逻辑" },
                { letter: "C", desc: "先和团队沟通，确保想法一致" }
            ]},
            { text: "朋友倾诉烦恼时，你更倾向于？", options: [
                { letter: "A", desc: "直接给建议，帮TA分析" },
                { letter: "B", desc: "理性梳理，提供客观视角" },
                { letter: "C", desc: "先共情，认可情绪，陪伴为主" }
            ]},
            { text: "面对陌生任务，你会？", options: [
                { letter: "A", desc: "兴奋尝试，从实践中学习" },
                { letter: "B", desc: "收集资料，规划好再动手" },
                { letter: "C", desc: "询问有经验的人，希望有人带" }
            ]},
            { text: "哪种描述更接近你的周末？", options: [
                { letter: "A", desc: "安排活动，充满能量" },
                { letter: "B", desc: "阅读学习，安静充实" },
                { letter: "C", desc: "和亲密的人放松聊天" }
            ]},
            { text: "团队意见分歧时，你通常？", options: [
                { letter: "A", desc: "直接表达，希望说服对方" },
                { letter: "B", desc: "列举事实，理性寻优" },
                { letter: "C", desc: "调解折中，维护和谐" }
            ]},
            { text: "做重要决定时，更看重？", options: [
                { letter: "A", desc: "当下的直觉和冲动" },
                { letter: "B", desc: "客观分析和长远规划" },
                { letter: "C", desc: "对身边人的影响" }
            ]},
            { text: "对于日程表和规则，你？", options: [
                { letter: "A", desc: "随性，不喜欢被约束" },
                { letter: "B", desc: "喜欢有计划，按部就班" },
                { letter: "C", desc: "灵活调整，顾及他人" }
            ]},
            { text: "压力大时，哪种方式更有效？", options: [
                { letter: "A", desc: "运动、逛街或找人嗨" },
                { letter: "B", desc: "一个人梳理问题" },
                { letter: "C", desc: "美食、治愈电影，安抚情绪" }
            ]},
            { text: "别人一般会形容你为？", options: [
                { letter: "A", desc: "活力满满，有感染力" },
                { letter: "B", desc: "冷静理性，考虑周全" },
                { letter: "C", desc: "善解人意，温和包容" }
            ]}
        ];

        // 性格结果映射
        const resultMap = {
            A: { title: "🔥 开拓·行动型", desc: "你是天生的发起者与行动派。能量外放，对新鲜事物充满热情，习惯用直觉和行动影响世界。你不怕冲突，享受人群，是团队里的催化剂。", tip: "优势：果断、热情、有感染力。偶尔放慢脚步，倾听理性声音会更好。" },
            B: { title: "🧠 理性·分析型", desc: "你是沉稳的思考者与规划师。逻辑是你的指南针，凡事讲求事实和条理。你喜欢掌控感，做决定前会深思熟虑，是团队中可靠的定海神针。", tip: "优势：严谨、客观、自律。试着多表达感受，偶尔的“小失控”也会很有趣。" },
            C: { title: "🌿 和谐·关系型", desc: "你是温暖的支持者与调和剂。对他人情绪敏感，珍视关系中的和谐。你乐于倾听、包容，愿意为群体氛围牺牲小我，是朋友心中的后盾。", tip: "优势：耐心、友善、善解人意。记得划定边界，勇敢表达自己的需求。" },
            mixed: { title: "🌈 多元融合型", desc: "你的性格具有出色的弹性与平衡性。能在开拓与内省、理性与感性间灵活切换，这是一种宝贵的复合特质。", tip: "你像一座桥梁，既能深入分析，又能温暖共情。保持这份独特吧。" }
        };

        const totalQ = questions.length;
        let currentIndex = 0;                 // 0 ~ 9
        let answers = new Array(totalQ).fill(null);   // 存储 'A','B','C'

        // DOM 元素
        const questionArea = document.getElementById('questionArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultArea = document.getElementById('resultArea');
        const pageIndicator = document.getElementById('pageIndicator');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');

        // 渲染当前题目
        function renderQuestion(index) {
            const q = questions[index];
            const selectedVal = answers[index];
            
            let html = `
                <div class="q-header">
                    <span class="q-num-badge">${index+1}</span>
                    <div class="q-text">${q.text}</div>
                </div>
                <div class="options-list">
            `;
            
            q.options.forEach(opt => {
                const isChecked = (selectedVal === opt.letter);
                html += `
                    <label class="option-item ${isChecked ? 'selected' : ''}">
                        <input type="radio" name="question" value="${opt.letter}" ${isChecked ? 'checked' : ''}>
                        <span class="opt-letter">${opt.letter}</span>
                        <span class="opt-desc">${opt.desc}</span>
                    </label>
                `;
            });
            html += `</div>`;
            questionArea.innerHTML = html;
            
            // 绑定单选事件
            const radios = document.querySelectorAll('input[name="question"]');
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const val = e.target.value;
                    answers[currentIndex] = val;
                    
                    // 更新选中样式
                    document.querySelectorAll('.option-item').forEach(item => {
                        const inp = item.querySelector('input');
                        if (inp && inp.checked) item.classList.add('selected');
                        else item.classList.remove('selected');
                    });
                    
                    // 如果结果面板开着，隐藏（因为答案变动）
                    if (resultArea.style.display === 'block') {
                        resultArea.style.display = 'none';
                    }
                    updateNavAndProgress();
                });
            });
            
            updateNavAndProgress();
        }

        // 更新进度条、按钮状态
        function updateNavAndProgress() {
            const current = currentIndex + 1;
            pageIndicator.innerText = `${current}/${totalQ}`;
            progressText.innerText = `第${current}题`;
            const percent = (current / totalQ) * 100;
            progressFill.style.width = percent + '%';
            
            // 上一页/下一页
            prevBtn.disabled = (currentIndex === 0);
            const isLast = (currentIndex === totalQ - 1);
            
            if (isLast) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
            }
        }

        // 切换页面
        function goToPage(newIdx) {
            if (newIdx < 0 || newIdx >= totalQ) return;
            currentIndex = newIdx;
            renderQuestion(currentIndex);
        }

        // 计算结果并展示
        function calculateAndShowResult() {
            // 检查是否全部回答
            const missing = answers.some(a => a === null);
            if (missing) {
                alert('您还有题目未完成，请回答所有问题后再查看结果。');
                // 跳转到第一个未答题
                const firstMissing = answers.findIndex(a => a === null);
                if (firstMissing !== -1) goToPage(firstMissing);
                return;
            }
            
            const scores = { A:0, B:0, C:0 };
            answers.forEach(a => { if (a) scores[a]++; });
            
            const maxVal = Math.max(scores.A, scores.B, scores.C);
            const maxKeys = [];
            if (scores.A === maxVal) maxKeys.push('A');
            if (scores.B === maxVal) maxKeys.push('B');
            if (scores.C === maxVal) maxKeys.push('C');
            
            const typeKey = maxKeys.length > 1 ? 'mixed' : maxKeys[0];
            const result = resultMap[typeKey] || resultMap.mixed;
            
            document.getElementById('resultTitle').innerText = result.title;
            document.getElementById('resultDesc').innerText = result.desc;
            document.getElementById('resultTip').innerText = result.tip;
            
            const scoreHtml = `
                <span class="score-badge">🅰 A倾向: ${scores.A}/10 (${scores.A*10}%)</span>
                <span class="score-badge">🅱 B倾向: ${scores.B}/10 (${scores.B*10}%)</span>
                <span class="score-badge">🅲 C倾向: ${scores.C}/10 (${scores.C*10}%)</span>
            `;
            document.getElementById('scoreDisplay').innerHTML = scoreHtml;
            
            resultArea.style.display = 'block';
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 重置所有
        function resetAll() {
            if (confirm('确定重新开始？当前进度会丢失。')) {
                answers = new Array(totalQ).fill(null);
                currentIndex = 0;
                renderQuestion(0);
                resultArea.style.display = 'none';
                updateNavAndProgress();
            }
        }

        // ----- 事件绑定 -----
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) goToPage(currentIndex - 1);
        });
        
        nextBtn.addEventListener('click', () => {
            if (currentIndex < totalQ - 1) goToPage(currentIndex + 1);
        });
        
        submitBtn.addEventListener('click', calculateAndShowResult);
        
        resetBtn.addEventListener('click', resetAll);
        
        // 初始化
        renderQuestion(0);
        
        // 附加：如果用户修改答案后，自动隐藏结果（已在radio change里实现）
        // 键盘/辅助功能良好
    })();
</script>
</body>
</html>
